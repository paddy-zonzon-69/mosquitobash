<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOSQUITO BASH v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Press Start 2P',monospace;
  background:#1a0a2e;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(255,100,200,0.04) 31px,rgba(255,100,200,0.04) 32px),
    repeating-linear-gradient(90deg,transparent,transparent 31px,rgba(255,100,200,0.04) 31px,rgba(255,100,200,0.04) 32px);
}
#gw{width:100%;max-width:700px;user-select:none}
#title-bar{text-align:center;margin-bottom:12px}
#title-bar h1{font-size:clamp(14px,3.5vw,26px);color:#ff2d78;text-shadow:3px 3px 0 #7a0038,6px 6px 0 #3a0018;letter-spacing:2px;line-height:1.4}
#title-bar .sub{font-size:clamp(6px,1.5vw,9px);color:#ff9ef5;margin-top:6px;letter-spacing:1px}
#hud{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:8px}
.hud-box{background:#0d0020;border:2px solid #ff2d78;padding:5px 3px;text-align:center;position:relative}
.hud-box::before{content:'';position:absolute;inset:1px;border:1px solid rgba(255,45,120,0.2);pointer-events:none}
.hud-label{font-size:clamp(4px,1vw,6px);color:#ff9ef5;letter-spacing:1px;margin-bottom:3px}
.hud-val{font-size:clamp(9px,2.2vw,14px);color:#ffe600;text-shadow:2px 2px 0 #7a6000}
.hud-hearts{font-size:clamp(9px,2.2vw,14px);letter-spacing:1px}
#streak-box{font-size:clamp(9px,2.2vw,14px);color:#ff6600;text-shadow:2px 2px 0 #7a3000}
#xp-section{margin-bottom:8px}
#xp-top{display:flex;justify-content:space-between;margin-bottom:4px}
#xp-grade-label{font-size:clamp(5px,1.2vw,7px);color:#ff9ef5;letter-spacing:1px}
#xp-grade{font-size:clamp(6px,1.5vw,9px);color:#ffe600;text-shadow:2px 2px 0 #7a6000}
#xp-track{height:14px;background:#0d0020;border:2px solid #ff2d78;position:relative;overflow:hidden}
#xp-fill{height:100%;width:0%;background:#ff2d78;transition:width 0.35s cubic-bezier(0.22,1,0.36,1);position:relative}
#xp-fill::after{content:'';position:absolute;top:0;right:0;bottom:0;width:3px;background:#fff;opacity:0.5;animation:scan 0.6s linear infinite}
@keyframes scan{0%{opacity:0.6}50%{opacity:0.1}100%{opacity:0.6}}
#xp-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:6px;color:#fff;letter-spacing:1px;pointer-events:none}

#arena{position:relative;width:100%;height:clamp(280px,48vw,380px);background:#0d0020;border:3px solid #ff2d78;overflow:hidden;cursor:crosshair;box-shadow:0 0 0 2px #7a0038,0 0 30px rgba(255,45,120,0.2);transition:background 0.1s}
#arena.flash-arena{background:#2a0040}
#arena-scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.15) 3px,rgba(0,0,0,0.15) 4px);pointer-events:none;z-index:5}
#arena-corners{position:absolute;inset:0;pointer-events:none;z-index:6}
#arena-corners::before,#arena-corners::after{content:'';position:absolute;width:12px;height:12px;border-color:#ff2d78;border-style:solid}
#arena-corners::before{top:4px;left:4px;border-width:2px 0 0 2px}
#arena-corners::after{bottom:4px;right:4px;border-width:0 2px 2px 0}

.mq{position:absolute;cursor:pointer;transform-origin:center;z-index:2;transition:filter 0.1s}
.mq:active{transform:scale(0.5) rotate(30deg)!important}
.mq .mq-lifebar-wrap{position:absolute;bottom:-6px;left:0;right:0;height:4px;background:rgba(0,0,0,0.5);border-radius:2px;overflow:hidden}
.mq .mq-lifebar{height:100%;border-radius:2px;transition:width 0.03s linear,background 0.3s}

#ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(10,0,30,0.93);z-index:20}
#ov .ov-title{font-size:clamp(12px,3vw,20px);color:#ff2d78;text-shadow:2px 2px 0 #7a0038;text-align:center;line-height:1.6}
#ov .ov-sub{font-size:clamp(5px,1.3vw,8px);color:#ff9ef5;text-align:center;line-height:2;letter-spacing:1px}
#ov .legend{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:2px}
#ov .litem{font-size:clamp(4px,1vw,7px);color:#ff9ef5;display:flex;align-items:center;gap:4px}
.ldot{width:8px;height:8px;flex-shrink:0;border:1px solid rgba(255,255,255,0.3)}
#play-btn{font-family:'Press Start 2P',monospace;font-size:clamp(8px,2vw,12px);background:#ff2d78;color:#fff;border:none;padding:10px 20px;cursor:pointer;letter-spacing:1px;margin-top:4px;box-shadow:3px 3px 0 #7a0038;transition:transform .1s,box-shadow .1s}
#play-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 #7a0038}
#play-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #7a0038}

#cf{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:clamp(7px,1.8vw,10px);pointer-events:none;opacity:0;white-space:nowrap;color:#ffe600;text-shadow:2px 2px 0 #7a6000;transition:opacity .15s;z-index:10}
#mf{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:clamp(6px,1.5vw,9px);pointer-events:none;opacity:0;color:#ff2d78;text-shadow:1px 1px 0 #7a0038;transition:opacity .15s;z-index:10}
#slowmo-overlay{position:absolute;inset:0;pointer-events:none;z-index:4;background:rgba(0,50,120,0.18);display:none;border:3px solid #44aaff}
#slowmo-timer{position:absolute;top:8px;right:8px;font-size:clamp(6px,1.5vw,8px);color:#44aaff;text-shadow:1px 1px 0 #002266;z-index:11;pointer-events:none;opacity:0;transition:opacity .2s}

.splat{position:absolute;pointer-events:none;z-index:8;font-size:28px;animation:sp .5s forwards}
@keyframes sp{0%{transform:scale(.3);opacity:1}60%{transform:scale(1.4);opacity:.9}100%{transform:scale(2);opacity:0}}
.rank-burst{position:absolute;inset:0;pointer-events:none;z-index:7;border:3px solid #ffe600;opacity:0;animation:rb .6s forwards}
@keyframes rb{0%{opacity:1}100%{opacity:0;transform:scale(1.04)}}
.score-pop{position:absolute;pointer-events:none;z-index:9;font-family:'Press Start 2P',monospace;font-size:clamp(8px,2vw,11px);color:#ffe600;text-shadow:1px 1px 0 #7a6000;animation:pop .8s forwards}
@keyframes pop{0%{opacity:1;transform:translateY(0) scale(1.2)}100%{opacity:0;transform:translateY(-36px) scale(.8)}}
.streak-pop{position:absolute;pointer-events:none;z-index:9;font-family:'Press Start 2P',monospace;font-size:clamp(9px,2.2vw,13px);color:#ff6600;text-shadow:2px 2px 0 #7a3000;animation:streakpop 1s forwards;left:50%;transform:translateX(-50%)}
@keyframes streakpop{0%{opacity:1;transform:translateX(-50%) scale(1.4)}100%{opacity:0;transform:translateX(-50%) translateY(-50px) scale(.8)}}
.powerup{position:absolute;cursor:pointer;z-index:3;animation:puFloat 0.7s ease-in-out infinite alternate;font-size:28px}
@keyframes puFloat{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-6px) scale(1.05)}}
.powerup-label{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:6px;color:#fff;white-space:nowrap;text-shadow:1px 1px 0 #000}
.boss-health{position:absolute;top:-10px;left:0;right:0;height:5px;background:rgba(0,0,0,0.5);border-radius:2px;overflow:hidden}
.boss-health-bar{height:100%;background:#E24B4A;border-radius:2px;transition:width 0.1s}

#pb-panel{font-size:clamp(5px,1.1vw,7px);color:#ff9ef5;text-align:center;line-height:1.8;margin-top:4px}
#pb-panel span{color:#ffe600}

#share-btn{font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.4vw,8px);background:transparent;color:#ff9ef5;border:1px solid #ff9ef5;padding:6px 12px;cursor:pointer;letter-spacing:1px;margin-top:6px}
#share-btn:hover{background:#ff2d78;color:#fff;border-color:#ff2d78}
#copy-notif{font-size:6px;color:#5DCAA5;margin-top:4px;opacity:0;transition:opacity .3s}

.h.dead{opacity:.2;filter:grayscale(1)}
</style>
</head>

    <div id="cf"></div>
    <div id="mf"></div>
    <div id="slowmo-timer"></div>
  </div>
</div>

function playFart(){
  try{var a=new Audio(FARTS[Math.floor(Math.random()*FARTS.length)]);a.volume=0.7;a.play();}catch(e){}
}

function playTone(freq,dur,vol,type){
  try{
    var ctx=window._actx||(window._actx=new(window.AudioContext||window.webkitAudioContext)());
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type||'square';o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+dur);
  }catch(e){}
}

function playComboSound(combo){
  var baseFreqs=[220,277,330,370,440,554,660,880];
  var f=baseFreqs[Math.min(combo-1,baseFreqs.length-1)];
  playTone(f,0.12,0.12,'square');
}

function playPowerupSound(){playTone(880,0.05,0.1,'sine');setTimeout(function(){playTone(1100,0.05,0.1,'sine');},60);setTimeout(function(){playTone(1320,0.08,0.1,'sine');},120);}
function playLoseLifeSound(){playTone(220,0.2,0.15,'sawtooth');setTimeout(function(){playTone(180,0.3,0.1,'sawtooth');},200);}
function playBossHitSound(){playTone(150,0.1,0.2,'square');}
function playBossDeathSound(){for(var i=0;i<5;i++){(function(ii){setTimeout(function(){playTone(440+ii*80,0.1,0.15,'square');},ii*60);})(i);}}

var score=0,best=0,combo=1,lives=3,level=1,hitCount=0,gameActive=false;
var streak=0,maxStreak=0,doubleActive=false,slowActive=false;
var targets=[],powerups=[],spawnTimer,displayScore=0,rafId;
var BOSS_INTERVAL=5;
var nextBossLevel=BOSS_INTERVAL;

var RANKS=[
  {name:'LARVA',threshold:0,color:'#5DCAA5'},
  {name:'MOZZIE',threshold:15,color:'#1D9E75'},
  {name:'PEST',threshold:35,color:'#378ADD'},
  {name:'DENGUE',threshold:60,color:'#EF9F27'},
  {name:'OUTBREAK',threshold:100,color:'#D85A30'},
  {name:'PANDEMIC',threshold:150,color:'#E24B4A'},
  {name:'EXTINCTION',threshold:220,color:'#7F77DD'}
];

var PB_RANKS={};
try{var pbRaw=localStorage.getItem('mqbash_pb');if(pbRaw)PB_RANKS=JSON.parse(pbRaw);}catch(e){}
try{var bs=parseInt(localStorage.getItem('mqbash_best'));if(!isNaN(bs))best=bs;}catch(e){}

function savePB(){try{localStorage.setItem('mqbash_pb',JSON.stringify(PB_RANKS));localStorage.setItem('mqbash_best',best);}catch(e){}}

function getRank(s){var r=RANKS[0];for(var i=0;i<RANKS.length;i++){if(s>=RANKS[i].threshold)r=RANKS[i];}return r;}
function getNextRank(s){for(var i=0;i<RANKS.length-1;i++){if(s>=RANKS[i].threshold&&s<RANKS[i+1].threshold)return RANKS[i+1];}return null;}

var svEl=document.getElementById('sv');
var bvEl=document.getElementById('bv');
var cvEl=document.getElementById('cv');
var hvEl=document.getElementById('hv');
var cfEl=document.getElementById('cf');
var mfEl=document.getElementById('mf');
var xpFill=document.getElementById('xp-fill');
var xpGrade=document.getElementById('xp-grade');
var xpText=document.getElementById('xp-text');
var arena=document.getElementById('arena');
var ov=document.getElementById('ov');
var streakEl=document.getElementById('streak-box');
var slowmoOverlay=document.getElementById('slowmo-overlay');
var slowmoTimer=document.getElementById('slowmo-timer');

bvEl.textContent=best;

function updateXP(){
  var cur=getRank(score);var nxt=getNextRank(score);
  xpGrade.textContent=cur.name;xpGrade.style.color=cur.color;xpFill.style.background=cur.color;
  if(nxt){var pct=Math.round((score-cur.threshold)/(nxt.threshold-cur.threshold)*100);xpFill.style.width=pct+'%';xpText.textContent=pct+'%';}
  else{xpFill.style.width='100%';xpText.textContent='MAX';}
}

function animScore(target){
  cancelAnimationFrame(rafId);
  var start=displayScore,diff=target-start,t0=performance.now();
  function step(now){var p=Math.min(1,(now-t0)/260);displayScore=Math.round(start+diff*p);svEl.textContent=displayScore;if(p<1)rafId=requestAnimationFrame(step);}
  rafId=requestAnimationFrame(step);
}

function vibrateHit(){try{if(navigator.vibrate)navigator.vibrate(30);}catch(e){}}

function flashArena(){
  arena.classList.add('flash-arena');
  setTimeout(function(){arena.classList.remove('flash-arena');},100);
}

function mqSVG(type){
  var pal={
    normal:{body:'#1a1a1a',stripe:'#e8e8e8',wing:'rgba(180,230,255,0.5)',leg:'#444',glow:'#5DCAA5'},
    fast:{body:'#5a0000',stripe:'#ff5555',wing:'rgba(255,120,120,0.5)',leg:'#7a0000',glow:'#E24B4A'},
    bonus:{body:'#4a3000',stripe:'#EF9F27',wing:'rgba(255,210,80,0.5)',leg:'#6a4000',glow:'#EF9F27'},
    big:{body:'#18003a',stripe:'#9988ff',wing:'rgba(150,130,255,0.5)',leg:'#30006a',glow:'#7F77DD'}
  };
  var c=pal[type]||pal.normal;
  var sz=type==='big'?72:50;
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 64" width="'+sz+'" height="'+Math.round(64*(sz/50))+'" style="image-rendering:pixelated;filter:drop-shadow(0 0 5px '+c.glow+')">'
    +'<ellipse cx="25" cy="23" rx="9" ry="14" fill="'+c.body+'"/>'
    +'<rect x="19" y="13" width="12" height="3" fill="'+c.stripe+'"/>'
    +'<rect x="18" y="19" width="14" height="3" fill="'+c.stripe+'"/>'
    +'<rect x="19" y="25" width="12" height="3" fill="'+c.stripe+'"/>'
    +'<rect x="13" y="2" width="24" height="17" rx="10" fill="'+c.body+'"/>'
    +'<ellipse cx="18" cy="8" rx="4" ry="5" fill="#ffe0b0"/><ellipse cx="32" cy="8" rx="4" ry="5" fill="#ffe0b0"/>'
    +'<circle cx="18" cy="7" r="2" fill="#222"/><circle cx="32" cy="7" r="2" fill="#222"/>'
    +'<ellipse cx="9" cy="18" rx="12" ry="6" fill="'+c.wing+'" transform="rotate(-30 9 18)"/>'
    +'<ellipse cx="41" cy="18" rx="12" ry="6" fill="'+c.wing+'" transform="rotate(30 41 18)"/>'
    +'<line x1="17" y1="29" x2="5" y2="39" stroke="'+c.leg+'" stroke-width="1.5"/>'
    +'<line x1="33" y1="29" x2="45" y2="39" stroke="'+c.leg+'" stroke-width="1.5"/>'
    +'<line x1="25" y1="37" x2="25" y2="52" stroke="'+c.body+'" stroke-width="2"/>'
    +'</svg>';
}

function getConfig(){
  return{
    interval:Math.max(450,1300-level*75),
    life:Math.max(900,2400-level*110),
    max:Math.min(4+Math.floor(level/2),10)
  };
}

function spawnPowerup(){
  if(!gameActive)return;
  var types=['slow','life','double'];
  var type=types[Math.floor(Math.random()*types.length)];
  var icons={slow:'⏱',life:'❤',double:'x2'};
  var colors={slow:'#44aaff',life:'#ff44aa',double:'#ffdd00'};
  var aw=arena.offsetWidth||640,ah=arena.offsetHeight||320;
  var x=20+Math.random()*(aw-80),y=20+Math.random()*(ah-80);
  var el=document.createElement('div');
  el.className='powerup';
  el.style.left=x+'px';el.style.top=y+'px';
  el.style.color=colors[type];
  el.style.textShadow='0 0 8px '+colors[type];
  el.innerHTML=icons[type]+'<div class="powerup-label">'+type.toUpperCase()+'</div>';
  var lifespan=6000;
  var killT=setTimeout(function(){el.style.opacity='0';setTimeout(function(){el.remove();powerups=powerups.filter(function(p){return p.el!==el;});},300);},lifespan);
  el.addEventListener('click',function(e){
    e.stopPropagation();
    clearTimeout(killT);
    el.remove();
    powerups=powerups.filter(function(p){return p.el!==el;});
    playPowerupSound();vibrateHit();
    activatePowerup(type,x+20,y+20);
  });
  arena.appendChild(el);
  powerups.push({el:el,kill:killT});
}

var slowTimer=null,doubleTimer=null,slowRemain=0,doubleRemain=0;
var slowInterval=null;

function activatePowerup(type,px,py){
  var pop=document.createElement('div');
  pop.className='score-pop';
  pop.style.left=px+'px';pop.style.top=py+'px';
  pop.style.color=type==='slow'?'#44aaff':type==='life'?'#ff44aa':'#ffdd00';
  pop.style.fontSize='13px';
  pop.textContent=type==='slow'?'SLOW-MO!':type==='life'?'+1 LIFE!':'x2 ON!';
  arena.appendChild(pop);setTimeout(function(){pop.remove();},900);

  if(type==='slow'){
    if(slowTimer)clearTimeout(slowTimer);
    if(slowInterval)clearInterval(slowInterval);
    slowActive=true;slowRemain=3;
    slowmoOverlay.style.display='block';
    slowmoTimer.style.opacity='1';
    slowmoTimer.textContent='SLOW x'+slowRemain+'s';
    targets.forEach(function(t){if(t.slowFactor!==undefined)t.slowFactor=0.3;});
    slowInterval=setInterval(function(){
      slowRemain--;
      slowmoTimer.textContent='SLOW x'+slowRemain+'s';
      if(slowRemain<=0){clearInterval(slowInterval);slowInterval=null;}
    },1000);
    slowTimer=setTimeout(function(){
      slowActive=false;
      slowmoOverlay.style.display='none';
      slowmoTimer.style.opacity='0';
      targets.forEach(function(t){if(t.slowFactor!==undefined)t.slowFactor=1;});
    },3000);
  } else if(type==='life'){
    if(lives<5){lives++;updateHearts();flash(cfEl,'❤ +1 LIFE !');}
    else{flash(cfEl,'LIVES FULL !');}
  } else if(type==='double'){
    if(doubleTimer)clearTimeout(doubleTimer);
    doubleActive=true;doubleRemain=8;
    flash(cfEl,'x2 POINTS !');
    var dInt=setInterval(function(){
      doubleRemain--;
      if(doubleRemain<=0){clearInterval(dInt);}
      else if(doubleRemain<=3){flash(cfEl,'x2 ENDS IN '+doubleRemain+'s');}
    },1000);
    doubleTimer=setTimeout(function(){
      doubleActive=false;flash(cfEl,'x2 ENDED');
    },8000);
  }
}

function isBossLevel(){return level===nextBossLevel;}

function spawn(){
  if(!gameActive)return;
  var c=getConfig();
  if(targets.length>=c.max)return;
  if(isBossLevel()){spawnBoss();nextBossLevel+=BOSS_INTERVAL;return;}
  var types=['normal','normal','normal','normal','fast','fast','bonus','big'];
  var type=types[Math.floor(Math.random()*types.length)];
  var isBig=(type==='big');
  var w=isBig?72:50;var h=isBig?93:64;
  var life=slowActive?(type==='fast'?c.life*.48*0.3:c.life*0.3):(type==='fast'?c.life*.48:c.life);
  var aw=arena.offsetWidth||640;var ah=arena.offsetHeight||320;
  var x=8+Math.random()*(aw-w-16);var y=8+Math.random()*(ah-h-16);
  var el=document.createElement('div');
  el.className='mq';
  el.style.left=x+'px';el.style.top=y+'px';el.style.width=w+'px';el.style.height=(h+8)+'px';
  el.innerHTML=mqSVG(type)
    +'<div class="mq-lifebar-wrap"><div class="mq-lifebar" style="width:100%;background:#5DCAA5"></div></div>';
  var elapsed=0;
  var sf=slowActive?0.3:1;
  var obj={el:el,timer:null,type:type,x:x,y:y,w:w,h:h,life:life,elapsed:0,slowFactor:sf,fleeing:false,fleeVx:0,fleeVy:0};

  var bar=el.querySelector('.mq-lifebar');
  var timer=setInterval(function(){
    var spd=obj.slowFactor||1;
    obj.elapsed+=30*spd;
    var pct=obj.elapsed/life;
    var ang,sc;

    if(level>=5&&!obj.fleeing&&pct>0.55){
      obj.fleeing=true;
      var cx=obj.x+w/2,cy=obj.y+h/2;
      var mx=aw/2,my=ah/2;
      var dx=cx-mx,dy=cy-my;
      var len=Math.sqrt(dx*dx+dy*dy)||1;
      obj.fleeVx=(dx/len)*2.5*(0.7+Math.random()*0.6);
      obj.fleeVy=(dy/len)*2.5*(0.7+Math.random()*0.6);
    }
    if(obj.fleeing){
      obj.x+=obj.fleeVx*spd;obj.y+=obj.fleeVy*spd;
      el.style.left=obj.x+'px';el.style.top=obj.y+'px';
      if(obj.x<-w-20||obj.x>aw+20||obj.y<-h-20||obj.y>ah+20){miss(el,timer,obj);return;}
      ang=0;sc=1-pct*.1;
    } else {
      ang=Math.sin(obj.elapsed/100)*10;sc=1-pct*.25;
    }
    el.style.transform='rotate('+ang+'deg) scale('+sc+')';
    el.style.opacity=1-pct*.5;
    var lifeColor=pct<0.5?'#5DCAA5':pct<0.75?'#EF9F27':'#E24B4A';
    bar.style.width=Math.max(0,(1-pct)*100)+'%';
    bar.style.background=lifeColor;
    if(obj.elapsed>=life)miss(el,timer,obj);
  },30);
  obj.timer=timer;
  el.addEventListener('click',function(e){e.stopPropagation();clearInterval(timer);hit(el,type,obj.x+w/2,obj.y+h/2);});
  arena.appendChild(el);
  targets.push(obj);
}

function spawnBoss(){
  if(!gameActive)return;
  if(targets.find(function(t){return t.type==='boss';}))return;
  var w=80,h=104;
  var aw=arena.offsetWidth||640;var ah=arena.offsetHeight||320;
  var x=aw/2-w/2,y=ah/2-h/2;
  var el=document.createElement('div');
  el.className='mq';
  el.style.left=x+'px';el.style.top=y+'px';el.style.width=w+'px';el.style.height=(h+14)+'px';
  el.style.zIndex='3';
  el.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 64" width="80" height="103" style="filter:drop-shadow(0 0 12px #ff0066)">'
    +'<ellipse cx="25" cy="23" rx="11" ry="16" fill="#2a0000"/>'
    +'<rect x="17" y="11" width="16" height="4" fill="#ff2244"/>'
    +'<rect x="16" y="18" width="18" height="4" fill="#ff2244"/>'
    +'<rect x="17" y="25" width="16" height="4" fill="#ff2244"/>'
    +'<rect x="11" y="2" width="28" height="20" rx="12" fill="#2a0000"/>'
    +'<ellipse cx="18" cy="9" rx="5" ry="6" fill="#ffaaaa"/><ellipse cx="32" cy="9" rx="5" ry="6" fill="#ffaaaa"/>'
    +'<circle cx="18" cy="8" r="3" fill="#ff0000"/><circle cx="32" cy="8" r="3" fill="#ff0000"/>'
    +'<circle cx="19" cy="7" r="1.2" fill="#fff"/><circle cx="33" cy="7" r="1.2" fill="#fff"/>'
    +'<ellipse cx="7" cy="17" rx="15" ry="7" fill="rgba(255,40,80,0.4)" transform="rotate(-25 7 17)"/>'
    +'<ellipse cx="43" cy="17" rx="15" ry="7" fill="rgba(255,40,80,0.4)" transform="rotate(25 43 17)"/>'
    +'<line x1="15" y1="30" x2="2" y2="42" stroke="#660011" stroke-width="2"/>'
    +'<line x1="35" y1="30" x2="48" y2="42" stroke="#660011" stroke-width="2"/>'
    +'<line x1="25" y1="37" x2="25" y2="55" stroke="#2a0000" stroke-width="3"/>'
    +'</svg>'
    +'<div class="boss-health"><div class="boss-health-bar" style="width:100%"></div></div>'
    +'<div class="mq-lifebar-wrap"><div class="mq-lifebar" style="width:100%;background:#E24B4A"></div></div>';
  var bossHp=3,bossMaxHp=3;
  var life=getConfig().life*2.5;
  var bossHealthBar=el.querySelector('.boss-health-bar');
  var lifeBar=el.querySelector('.mq-lifebar');
  var obj={el:el,timer:null,type:'boss',x:x,y:y,w:w,h:h,life:life,elapsed:0,slowFactor:slowActive?0.3:1,hp:bossHp,maxHp:bossMaxHp};
  var timer=setInterval(function(){
    var spd=obj.slowFactor||1;
    obj.elapsed+=30*spd;
    var pct=obj.elapsed/life;
    var t=obj.elapsed/1000;
    obj.x=aw/2-w/2+Math.sin(t*1.2)*80;
    obj.y=ah/2-h/2+Math.cos(t*0.8)*60;
    el.style.left=obj.x+'px';el.style.top=obj.y+'px';
    el.style.transform='scale('+(1+Math.sin(t*3)*0.06)+')';
    lifeBar.style.width=Math.max(0,(1-pct)*100)+'%';
    if(obj.elapsed>=life)miss(el,timer,obj);
  },30);
  obj.timer=timer;
  flash(cfEl,'⚠ BOSS INCOMING !');
  el.addEventListener('click',function(e){
    e.stopPropagation();
    obj.hp--;
    playBossHitSound();vibrateHit();
    bossHealthBar.style.width=Math.max(0,obj.hp/obj.maxHp*100)+'%';
    var sparkX=obj.x+w/2,sparkY=obj.y+h/2;
    var pop=document.createElement('div');pop.className='score-pop';
    pop.textContent='HIT!';pop.style.left=sparkX+'px';pop.style.top=sparkY+'px';
    pop.style.color='#ff2244';arena.appendChild(pop);setTimeout(function(){pop.remove();},700);
    if(obj.hp<=0){
      clearInterval(timer);
      playBossDeathSound();
      el.style.opacity='0';
      setTimeout(function(){el.remove();},150);
      targets=targets.filter(function(t){return t.el!==el;});
      var pts=4*(doubleActive?2:1)*combo;
      var oldRank=getRank(score).name;
      score+=pts;combo=Math.min(combo+1,8);streak++;
      if(streak>maxStreak)maxStreak=streak;
      cvEl.textContent='x'+combo;streakEl.textContent=streak;
      if(score>best){best=score;bvEl.textContent=best;savePB();}
      animScore(score);updateXP();
      var newRank=getRank(score).name;
      if(newRank!==oldRank){flash(cfEl,'★ '+newRank+' ★');addBurst();}
      else{flash(cfEl,'BOSS DOWN! +'+pts+'pts');}
      addScorePop(pts,sparkX,sparkY);addSplat(sparkX,sparkY);
      flashArena();flashArena();
    }
  });
  arena.appendChild(el);
  targets.push(obj);
}

function addBurst(){var b=document.createElement('div');b.className='rank-burst';arena.appendChild(b);setTimeout(function(){b.remove();},600);}
function addSplat(px,py){var s=document.createElement('div');s.className='splat';s.style.left=(px-16)+'px';s.style.top=(py-16)+'px';s.textContent='💥';arena.appendChild(s);setTimeout(function(){s.remove();},500);}
function addScorePop(pts,px,py){var p=document.createElement('div');p.className='score-pop';p.textContent='+'+pts;p.style.left=(px-12)+'px';p.style.top=(py-12)+'px';arena.appendChild(p);setTimeout(function(){p.remove();},800);}

function hit(el,type,px,py){
  playFart();vibrateHit();
  var pts=(type==='big'?4:type==='bonus'?3:type==='fast'?2:1)*(doubleActive?2:1);
  var oldRank=getRank(score).name;
  score+=pts*combo;combo=Math.min(combo+1,8);hitCount++;streak++;
  if(streak>maxStreak)maxStreak=streak;
  cvEl.textContent='x'+combo;streakEl.textContent=streak;
  playComboSound(combo);
  if(score>best){best=score;bvEl.textContent=best;savePB();}
  var rnk=getRank(score);
  if(PB_RANKS[rnk.name]===undefined||score>PB_RANKS[rnk.name]){PB_RANKS[rnk.name]=score;savePB();}
  animScore(score);updateXP();
  var newRank=getRank(score).name;
  if(newRank!==oldRank){flash(cfEl,'★ '+newRank+' ★');addBurst();}
  else if(combo>=5){
    flashArena();
    var sp=document.createElement('div');sp.className='streak-pop';
    sp.textContent=combo>=8?'UNSTOPPABLE!!':combo>=6?'ON FIRE!':'COMBO x'+combo+'!!';
    sp.style.top='40%';arena.appendChild(sp);setTimeout(function(){sp.remove();},1000);
  } else if(combo>=3){flash(cfEl,'COMBO x'+combo+' !!');}
  if(streak===5){var fs=document.createElement('div');fs.className='streak-pop';fs.textContent='🔥 STREAK 5!';fs.style.top='30%';arena.appendChild(fs);setTimeout(function(){fs.remove();},1200);}
  if(streak===10){var fs2=document.createElement('div');fs2.className='streak-pop';fs2.style.color='#ff2d78';fs2.textContent='💀 STREAK 10!!';fs2.style.top='25%';arena.appendChild(fs2);setTimeout(function(){fs2.remove();},1400);}
  addScorePop(pts*combo,px,py);addSplat(px,py);
  el.style.transition='transform .1s,opacity .1s';el.style.opacity='0';
  setTimeout(function(){el.remove();},110);
  targets=targets.filter(function(t){return t.el!==el;});
  if(hitCount>=8*level){level++;flash(cfEl,'LEVEL '+level+' !');clearInterval(spawnTimer);spawnTimer=setInterval(spawn,getConfig().interval);}
  if(Math.random()<0.06)spawnPowerup();
}

function miss(el,timer,obj){
  if(el.parentNode!==arena)return;
  clearInterval(timer);
  el.style.transition='opacity .2s';el.style.opacity='0';
  setTimeout(function(){if(el.parentNode)el.remove();},200);
  targets=targets.filter(function(t){return t.el!==el;});
  streak=0;cvEl.textContent='x1';combo=1;streakEl.textContent='0';
  playLoseLifeSound();lives--;updateHearts();
  flash(mfEl,'ESCAPED ! -1 LIFE');
  if(lives<=0)endGame();
}

function updateHearts(){var s='';for(var i=0;i<5;i++)s+=i<lives?'❤️':'🖤';hvEl.textContent=s.substring(0,lives*2+Math.max(0,(3-lives))*2);}

function updateHearts(){
  var s='';
  for(var i=0;i<Math.max(3,lives);i++)s+=i<lives?'❤️':'🖤';
  hvEl.textContent=s;
}

function flash(el,msg){el.textContent=msg;el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(function(){el.style.opacity='0';},1400);}

ov.addEventListener('click',function(e){e.stopPropagation();});
arena.addEventListener('click',function(){
  if(!gameActive)return;
  combo=1;streak=0;cvEl.textContent='x1';streakEl.textContent='0';
  playLoseLifeSound();
  flash(mfEl,'MISSED ! -1 LIFE');
  lives--;updateHearts();
  if(lives<=0)endGame();
});

function buildPBPanel(){
  var html='';
  RANKS.forEach(function(r){
    if(PB_RANKS[r.name]!==undefined){
      html+='<span style="color:'+r.color+'">'+r.name+'</span>: <span>'+PB_RANKS[r.name]+'</span>  ';
    }
  });
  if(html)document.getElementById('pb-panel').innerHTML='PERSONAL BEST:<br>'+html;
}

function startGame(){
  score=0;displayScore=0;combo=1;lives=3;level=1;hitCount=0;streak=0;maxStreak=0;
  doubleActive=false;slowActive=false;
  if(slowTimer)clearTimeout(slowTimer);if(doubleTimer)clearTimeout(doubleTimer);
  if(slowInterval)clearInterval(slowInterval);
  slowmoOverlay.style.display='none';slowmoTimer.style.opacity='0';
  nextBossLevel=BOSS_INTERVAL;
  targets.forEach(function(t){clearInterval(t.timer);if(t.el.parentNode)t.el.remove();});
  powerups.forEach(function(p){clearTimeout(p.kill);if(p.el.parentNode)p.el.remove();});
  targets=[];powerups=[];
  svEl.textContent='0';cvEl.textContent='x1';streakEl.textContent='0';
  updateHearts();updateXP();
  ov.style.display='none';gameActive=true;
  spawnTimer=setInterval(spawn,getConfig().interval);
}

function endGame(){
  gameActive=false;clearInterval(spawnTimer);
  targets.forEach(function(t){clearInterval(t.timer);if(t.el.parentNode)t.el.remove();});
  powerups.forEach(function(p){clearTimeout(p.kill);if(p.el.parentNode)p.el.remove();});
  targets=[];powerups=[];
  var rank=getRank(score);
  var curRankName=rank.name;
  if(PB_RANKS[curRankName]===undefined||score>PB_RANKS[curRankName]){PB_RANKS[curRankName]=score;savePB();}
  var pbStr='';
  RANKS.forEach(function(r){if(PB_RANKS[r.name]!==undefined)pbStr+='<span style="color:'+r.color+'">'+r.name+'</span>:'+PB_RANKS[r.name]+' ';});
  ov.innerHTML='<div class="ov-title">GAME OVER</div>'
    +'<div class="ov-sub">RANK : <span style="color:'+rank.color+'">'+rank.name+'</span><br>'
    +'SCORE : <span style="color:#ffe600">'+score+'</span> &nbsp;·&nbsp; BEST : '+best+'<br>'
    +'LVL '+level+' &nbsp;·&nbsp; MAX STREAK : '+maxStreak+'</div>'
    +(pbStr?'<div style="font-size:6px;color:#ff9ef5;text-align:center;margin-top:4px">RECORDS:<br>'+pbStr+'</div>':'')
    +'<button id="play-btn" style="font-family:\'Press Start 2P\',monospace;font-size:10px;background:#ff2d78;color:#fff;border:none;padding:10px 20px;cursor:pointer;letter-spacing:1px;margin-top:6px;box-shadow:3px 3px 0 #7a0038">► PLAY AGAIN</button>'
    +'<button id="share-btn">⎘ SHARE SCORE</button>'
    +'<div id="copy-notif">COPIED !</div>';
  ov.style.display='flex';
  ov.addEventListener('click',function(e){e.stopPropagation();});
  document.getElementById('play-btn').addEventListener('click',startGame);
  document.getElementById('share-btn').addEventListener('click',function(){
    var txt='MOSQUITO BASH v2 🦟\nScore: '+score+' | Rank: '+rank.name+'\nLevel: '+level+' | Max Streak: '+maxStreak+'\nBeat me! 🎮';
    try{navigator.clipboard.writeText(txt).then(function(){document.getElementById('copy-notif').style.opacity='1';setTimeout(function(){document.getElementById('copy-notif').style.opacity='0';},2000);});}
    catch(e){prompt('Copy this:',txt);}
  });
}

buildPBPanel();
document.getElementById('play-btn').addEventListener('click',startGame);
</script>
