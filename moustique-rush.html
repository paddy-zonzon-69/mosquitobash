<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moustique Rush</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
#gw{width:100%;max-width:640px;user-select:none}
#arena{position:relative;width:100%;height:340px;background:#0a0f1a;border-radius:16px;overflow:hidden;cursor:crosshair;border:1px solid #1a2540}
.mq{position:absolute;cursor:pointer;transform-origin:center}
.mq:active{transform:scale(0.6) rotate(25deg)!important}
#topbar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-bottom:10px}
#score-big{font-size:32px;font-weight:600;color:#fff;letter-spacing:-0.5px}
#title-center{text-align:center;font-size:12px;font-weight:600;color:#8899aa;letter-spacing:.1em;text-transform:uppercase}
#right-stats{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.stat-pill{background:#141b26;border:1px solid #1e2d40;border-radius:20px;padding:3px 10px;font-size:12px;color:#8899aa;display:flex;align-items:center;gap:5px}
.stat-pill b{color:#e0e8f0;font-weight:600}
#xp-wrap{margin-bottom:8px}
#xp-labels{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
#xp-label{font-size:11px;color:#8899aa;letter-spacing:.06em;text-transform:uppercase}
#xp-rank{font-size:11px;font-weight:600;color:#1D9E75}
#xp-bar-bg{height:8px;background:#141b26;border-radius:4px;overflow:hidden;border:1px solid #1e2d40}
#xp-bar{height:100%;width:0%;border-radius:4px;background:#1D9E75;transition:width 0.4s cubic-bezier(0.22,1,0.36,1)}
#ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(5,8,20,0.92);border-radius:16px;z-index:10}
#ov h2{color:#fff;font-size:22px;font-weight:600}
#ov p{color:rgba(255,255,255,0.6);font-size:12px;text-align:center;padding:0 24px;line-height:1.8}
.legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.litem{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,0.5)}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#play-btn{background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:10px 28px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;letter-spacing:.02em}
#play-btn:hover{background:#5DCAA5}
#cf{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-weight:600;font-size:15px;pointer-events:none;opacity:0;white-space:nowrap;color:#EF9F27;transition:opacity .2s}
#mf{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-weight:600;font-size:13px;pointer-events:none;opacity:0;color:#E24B4A;transition:opacity .2s}
.splat{position:absolute;pointer-events:none;font-size:22px;animation:sp .45s forwards}
@keyframes sp{0%{transform:scale(.5);opacity:1}100%{transform:scale(2);opacity:0}}
.rank-burst{position:absolute;inset:0;pointer-events:none;border-radius:16px;border:2px solid #EF9F27;opacity:0;animation:rb .5s forwards}
@keyframes rb{0%{opacity:.9}100%{opacity:0;transform:scale(1.03)}}
.score-pop{position:absolute;pointer-events:none;font-size:13px;font-weight:600;color:#5DCAA5;animation:sp2 .7s forwards}
@keyframes sp2{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-28px)}}
.h{font-size:14px;transition:transform .2s}
.h.dead{opacity:.25;transform:scale(.8)}
</style>
</head>
<body>
<div id="gw">
  <div id="topbar">
    <div>
      <div style="font-size:11px;color:#8899aa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Score</div>
      <div id="score-big">0</div>
    </div>
    <div id="title-center">Moustique Rush</div>
    <div id="right-stats">
      <div class="stat-pill">Meilleur <b id="bv">0</b></div>
      <div class="stat-pill">Combo <b id="cv">x1</b></div>
      <div class="stat-pill">Niv. <b id="lv">1</b></div>
      <div style="display:flex;gap:3px">
        <span class="h" id="h0">❤️</span><span class="h" id="h1">❤️</span><span class="h" id="h2">❤️</span>
      </div>
    </div>
  </div>
  <div id="xp-wrap">
    <div id="xp-labels">
      <span id="xp-label">Infectiosité</span>
      <span id="xp-rank">Larve</span>
    </div>
    <div id="xp-bar-bg"><div id="xp-bar"></div></div>
  </div>
  <div id="arena">
    <div id="ov">
      <div style="font-size:44px">🦟</div>
      <h2>Moustique Rush</h2>
      <p>Ecrase les moustiques avant qu'ils s'envolent !<br>Remplis la jauge pour monter en grade.</p>
      <div class="legend">
        <div class="litem"><div class="ldot" style="background:#5DCAA5"></div>Normal +1</div>
        <div class="litem"><div class="ldot" style="background:#E24B4A"></div>Rapide +2</div>
        <div class="litem"><div class="ldot" style="background:#EF9F27"></div>Or +3</div>
        <div class="litem"><div class="ldot" style="background:#7F77DD"></div>Gros +4</div>
      </div>
      <button id="play-btn">Jouer !</button>
    </div>
    <div id="cf"></div>
    <div id="mf"></div>
  </div>
</div>

<script>
var score=0,best=0,combo=1,lives=3,level=1,hitCount=0,gameActive=false;
var targets=[],spawnTimer,displayScore=0,rafId;

var RANKS=[
  {name:'Larve',threshold:0,color:'#5DCAA5'},
  {name:'Moustique',threshold:15,color:'#1D9E75'},
  {name:'Nuisible',threshold:35,color:'#378ADD'},
  {name:'Dengue',threshold:60,color:'#EF9F27'},
  {name:'Epidémie',threshold:100,color:'#D85A30'},
  {name:'Pandémie',threshold:150,color:'#E24B4A'},
  {name:'Extinction',threshold:220,color:'#7F77DD'}
];

function getRank(s){
  var r=RANKS[0];
  for(var i=0;i<RANKS.length;i++){if(s>=RANKS[i].threshold)r=RANKS[i];}
  return r;
}
function getNextRank(s){
  for(var i=0;i<RANKS.length-1;i++){if(s>=RANKS[i].threshold&&s<RANKS[i+1].threshold)return RANKS[i+1];}
  return null;
}

var scoreEl=document.getElementById('score-big');
var bvEl=document.getElementById('bv');
var cvEl=document.getElementById('cv');
var lvEl=document.getElementById('lv');
var cfEl=document.getElementById('cf');
var mfEl=document.getElementById('mf');
var xpBar=document.getElementById('xp-bar');
var xpRank=document.getElementById('xp-rank');
var arena=document.getElementById('arena');
var ov=document.getElementById('ov');

function updateXP(){
  var cur=getRank(score);
  var nxt=getNextRank(score);
  xpRank.textContent=cur.name;
  xpRank.style.color=cur.color;
  xpBar.style.background=cur.color;
  if(nxt){
    var pct=((score-cur.threshold)/(nxt.threshold-cur.threshold))*100;
    xpBar.style.width=Math.min(100,pct)+'%';
  } else {
    xpBar.style.width='100%';
  }
}

function animScore(target){
  cancelAnimationFrame(rafId);
  var start=displayScore;
  var diff=target-start;
  var t0=performance.now();
  function step(now){
    var p=Math.min(1,(now-t0)/280);
    displayScore=Math.round(start+diff*p);
    scoreEl.textContent=displayScore;
    if(p<1)rafId=requestAnimationFrame(step);
  }
  rafId=requestAnimationFrame(step);
}

function mqSVG(type){
  var pal={
    normal:{body:'#1a1a1a',stripe:'#e8e8e8',wing:'rgba(180,230,255,0.45)',eye:'#E24B4A',leg:'#333'},
    fast:{body:'#6b0000',stripe:'#ff7070',wing:'rgba(255,160,160,0.45)',eye:'#ffee00',leg:'#8b0000'},
    bonus:{body:'#5c3d00',stripe:'#EF9F27',wing:'rgba(255,220,100,0.45)',eye:'#fff',leg:'#7a5000'},
    big:{body:'#1a0040',stripe:'#7F77DD',wing:'rgba(160,140,255,0.45)',eye:'#EF9F27',leg:'#3c2080'}
  };
  var c=pal[type]||pal.normal;
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 54" width="48" height="54">'
    +'<ellipse cx="24" cy="20" rx="7" ry="12" fill="'+c.body+'"/>'
    +'<rect x="20" y="11" width="8" height="2.2" rx="1" fill="'+c.stripe+'"/>'
    +'<rect x="19" y="15" width="10" height="2.2" rx="1" fill="'+c.stripe+'"/>'
    +'<rect x="20" y="19" width="8" height="2.2" rx="1" fill="'+c.stripe+'"/>'
    +'<rect x="21" y="23" width="6" height="1.8" rx="1" fill="'+c.stripe+'"/>'
    +'<ellipse cx="24" cy="9" rx="5" ry="5.5" fill="'+c.body+'"/>'
    +'<circle cx="21.5" cy="8" r="1.8" fill="'+c.eye+'"/>'
    +'<circle cx="26.5" cy="8" r="1.8" fill="'+c.eye+'"/>'
    +'<circle cx="21.5" cy="8" r=".8" fill="#000"/>'
    +'<circle cx="26.5" cy="8" r=".8" fill="#000"/>'
    +'<line x1="24" y1="4" x2="21" y2="1" stroke="'+c.body+'" stroke-width=".8"/>'
    +'<line x1="24" y1="4" x2="27" y2="1" stroke="'+c.body+'" stroke-width=".8"/>'
    +'<ellipse cx="11" cy="15" rx="10" ry="4.5" fill="'+c.wing+'" transform="rotate(-28 11 15)"/>'
    +'<ellipse cx="37" cy="15" rx="10" ry="4.5" fill="'+c.wing+'" transform="rotate(28 37 15)"/>'
    +'<ellipse cx="12" cy="20" rx="7" ry="3" fill="'+c.wing+'" opacity=".7" transform="rotate(-15 12 20)"/>'
    +'<ellipse cx="36" cy="20" rx="7" ry="3" fill="'+c.wing+'" opacity=".7" transform="rotate(15 36 20)"/>'
    +'<line x1="18" y1="24" x2="8" y2="33" stroke="'+c.leg+'" stroke-width="1"/>'
    +'<line x1="18" y1="27" x2="7" y2="37" stroke="'+c.leg+'" stroke-width="1"/>'
    +'<line x1="19" y1="30" x2="9" y2="41" stroke="'+c.leg+'" stroke-width="1"/>'
    +'<line x1="30" y1="24" x2="40" y2="33" stroke="'+c.leg+'" stroke-width="1"/>'
    +'<line x1="30" y1="27" x2="41" y2="37" stroke="'+c.leg+'" stroke-width="1"/>'
    +'<line x1="29" y1="30" x2="39" y2="41" stroke="'+c.leg+'" stroke-width="1"/>'
    +'<line x1="24" y1="32" x2="24" y2="44" stroke="'+c.body+'" stroke-width="1.2"/>'
    +'<line x1="24" y1="44" x2="26" y2="52" stroke="'+c.body+'" stroke-width="1"/>'
    +'<line x1="24" y1="44" x2="22" y2="52" stroke="'+c.body+'" stroke-width="1"/>'
    +'</svg>';
}

function getConfig(){
  return{
    interval:Math.max(500,1300-level*75),
    life:Math.max(900,2300-level*110),
    max:Math.min(4+Math.floor(level/2),9)
  };
}

function spawn(){
  var c=getConfig();
  if(targets.length>=c.max)return;
  var types=['normal','normal','normal','normal','fast','fast','bonus','big'];
  var type=types[Math.floor(Math.random()*types.length)];
  var isBig=type==='big';
  var w=isBig?60:48,h=isBig?68:54;
  var life=type==='fast'?c.life*.5:c.life;
  var aw=arena.offsetWidth||600;
  var ah=arena.offsetHeight||340;
  var x=8+Math.random()*(aw-w-16);
  var y=8+Math.random()*(ah-h-16);

  var el=document.createElement('div');
  el.className='mq';
  el.style.left=x+'px';
  el.style.top=y+'px';
  el.style.width=w+'px';
  el.style.height=h+'px';
  el.innerHTML=mqSVG(type);
  if(isBig){var s=el.querySelector('svg');s.setAttribute('width',60);s.setAttribute('height',68);}

  var elapsed=0;
  var timer=setInterval(function(){
    elapsed+=30;
    var pct=elapsed/life;
    var ang=Math.sin(elapsed/110)*9;
    var sc=1-pct*.28;
    el.style.transform='rotate('+ang+'deg) scale('+sc+')';
    el.style.opacity=1-pct*.55;
    if(elapsed>=life)miss(el,timer);
  },30);

  el.addEventListener('click',function(e){
    e.stopPropagation();
    clearInterval(timer);
    hit(el,type,x+w/2,y+h/2);
  });

  arena.appendChild(el);
  targets.push({el:el,timer:timer});
}

function hit(el,type,px,py){
  var pts=type==='big'?4:type==='bonus'?3:type==='fast'?2:1;
  var oldRank=getRank(score).name;
  score+=pts*combo;
  combo=Math.min(combo+1,8);
  hitCount++;
  cvEl.textContent='x'+combo;
  if(score>best){best=score;bvEl.textContent=best;}
  animScore(score);
  updateXP();

  var newRank=getRank(score).name;
  if(newRank!==oldRank){
    flash(cfEl,'🔥 '+newRank+' !');
    var burst=document.createElement('div');
    burst.className='rank-burst';
    arena.appendChild(burst);
    setTimeout(function(){burst.remove();},500);
  } else if(combo>=3){
    flash(cfEl,'⚡ Combo x'+combo);
  }

  var pop=document.createElement('div');
  pop.className='score-pop';
  pop.textContent='+'+pts*combo;
  pop.style.left=(px-10)+'px';
  pop.style.top=(py-10)+'px';
  arena.appendChild(pop);
  setTimeout(function(){pop.remove();},700);

  var splat=document.createElement('div');
  splat.className='splat';
  splat.textContent='💥';
  splat.style.left=(px-16)+'px';
  splat.style.top=(py-16)+'px';
  arena.appendChild(splat);
  setTimeout(function(){splat.remove();},450);

  el.style.transition='transform .12s,opacity .12s';
  el.style.opacity='0';
  setTimeout(function(){el.remove();},120);
  targets=targets.filter(function(t){return t.el!==el;});

  if(hitCount>=8*level){
    level++;
    lvEl.textContent=level;
    clearInterval(spawnTimer);
    spawnTimer=setInterval(spawn,getConfig().interval);
  }
}

function miss(el,timer){
  clearInterval(timer);
  el.style.transition='opacity .2s';
  el.style.opacity='0';
  setTimeout(function(){el.remove();},200);
  targets=targets.filter(function(t){return t.el!==el;});
  combo=1;cvEl.textContent='x1';
  lives--;updateHearts();
  flash(mfEl,'Envolé ! 🦟');
  if(lives<=0)endGame();
}

function updateHearts(){
  for(var i=0;i<3;i++){
    var h=document.getElementById('h'+i);
    h.textContent=i<lives?'❤️':'🖤';
    h.className='h'+(i>=lives?' dead':'');
  }
}

function flash(el,msg){
  el.textContent=msg;
  el.style.opacity='1';
  clearTimeout(el._t);
  el._t=setTimeout(function(){el.style.opacity='0';},1100);
}

arena.addEventListener('click',function(){
  if(!gameActive)return;
  combo=1;cvEl.textContent='x1';
  flash(mfEl,'Raté ! 🦟');
  lives--;updateHearts();
  if(lives<=0)endGame();
});

function startGame(){
  score=0;displayScore=0;combo=1;lives=3;level=1;hitCount=0;
  targets.forEach(function(t){clearInterval(t.timer);t.el.remove();});
  targets=[];
  scoreEl.textContent='0';
  cvEl.textContent='x1';
  lvEl.textContent='1';
  updateHearts();
  updateXP();
  ov.style.display='none';
  gameActive=true;
  spawnTimer=setInterval(spawn,getConfig().interval);
}

function endGame(){
  gameActive=false;
  clearInterval(spawnTimer);
  targets.forEach(function(t){clearInterval(t.timer);t.el.remove();});
  targets=[];
  var rank=getRank(score);
  ov.innerHTML='<div style="font-size:40px">🦟</div>'
    +'<h2 style="color:#fff">Partie terminée</h2>'
    +'<p>Grade : <b style="color:'+rank.color+';font-size:15px">'+rank.name+'</b><br>'
    +'Score : <b style="color:#EF9F27;font-size:22px">'+score+'</b> &nbsp;·&nbsp; Meilleur : '+best+'<br>Niveau '+level+'</p>'
    +'<button id="play-btn" style="background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:10px 28px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px">Rejouer</button>';
  ov.style.display='flex';
  document.getElementById('play-btn').addEventListener('click',startGame);
}

document.getElementById('play-btn').addEventListener('click',startGame);
</script>
</body>
</html>
